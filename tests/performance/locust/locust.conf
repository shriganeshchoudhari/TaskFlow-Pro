# Locust configuration file — shared defaults for all locustfile runs.
# Override any value with CLI flags: --users, --run-time, etc.
# Docs: https://docs.locust.io/en/stable/configuration.html

# Target host (override with --host or LOCUST_HOST env var)
host = http://localhost:8080

# Headless CI mode (set to false for interactive web UI)
headless = true

# Default VU count and spawn rate (override per test type via CLI)
users      = 100
spawn-rate = 10
run-time   = 10m

# Reporting
html    = reports/locust-report.html
csv     = reports/locust-stats

# Exit with non-zero code on threshold breach (set in quitting event handler)
exit-code-on-error = true

# Log level
loglevel = INFO
