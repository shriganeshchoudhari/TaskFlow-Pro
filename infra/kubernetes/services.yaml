apiVersion: v1
kind: Service
metadata:
  name: taskflow-backend
spec:
  selector:
    app: taskflow-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-frontend
spec:
  selector:
    app: taskflow-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80

