<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TaskFlow Pro - Sign In</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

              "on-surface-variant": "#414751",
              "primary-container": "#005dac",
              "on-primary-fixed": "#001c3a",
              "surface-dim": "#d9dadc",
              "error": "#ba1a1a",
              "on-error": "#ffffff",
              "surface-bright": "#f8f9fb",
              "on-error-container": "#93000a",
              "inverse-surface": "#2e3132",
              "secondary-fixed": "#d4e3ff",
              "on-surface": "#191c1e",
              "surface": "#f8f9fb",
              "secondary-fixed-dim": "#b2c8ed",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ambient-glow {
            box-shadow: 0 40px 80px -10px rgba(0, 93, 172, 0.08);
        }
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 1px #004583;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center overflow-x-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation Anchor (As prescribed by Shared Components JSON) -->
<!-- Suppression logic: Since this is a Transactional/Login screen, the TopAppBar is hidden/simplified to branding only per UX Goal -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center py-6 px-8 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-sm shadow-blue-500/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400 text-3xl">blur_on</span>
<span class="font-manrope font-bold tracking-tight text-2xl font-extrabold bg-gradient-to-br from-blue-600 to-blue-800 bg-clip-text text-transparent">TaskFlow Pro</span>
</div>
</header>
<main class="flex-1 w-full max-w-7xl mx-auto px-6 py-24 flex items-center justify-center relative">
<!-- Subtle background texture element -->
<div class="absolute inset-0 -z-10 flex items-center justify-center overflow-hidden pointer-events-none">
<div class="w-[800px] h-[800px] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute right-0 top-0 w-[400px] h-[400px] rounded-full bg-secondary-container/10 blur-[100px]"></div>
</div>
<!-- Authentication Card -->
<div class="w-full max-w-[560px] bg-surface-container-lowest rounded-xl p-12 ambient-glow relative z-10">
<!-- Header Section -->
<div class="text-center mb-12">
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-3">Welcome Back</h1>
<p class="text-on-surface-variant font-body leading-relaxed max-w-xs mx-auto">
                    Sign in to your dashboard to manage your precision workflows.
                </p>
</div>
<!-- Form Area -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group input-focus-ring rounded-lg transition-all duration-200">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full h-14 pl-12 pr-4 bg-surface-container-highest border-0 rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-0 focus:bg-white transition-all font-body" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-semibold text-on-secondary-fixed-variant" for="password">Password</label>
</div>
<div class="relative group input-focus-ring rounded-lg transition-all duration-200">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full h-14 pl-12 pr-12 bg-surface-container-highest border-0 rounded-lg text-on-surface placeholder:text-outline/60 focus:ring-0 focus:bg-white transition-all font-body" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Extra -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-highest transition-all" type="checkbox"/>
<span class="ml-3 text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Keep me signed in</span>
</label>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full h-14 bg-gradient-to-br from-primary-container to-primary text-on-primary font-headline font-bold rounded-lg shadow-lg shadow-primary-container/20 hover:shadow-xl hover:shadow-primary-container/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</form>
<!-- SSO Integration (Modern Detail) -->
<div class="mt-10 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-4 bg-surface-container-lowest text-outline font-semibold tracking-widest uppercase">Or continue with</span>
</div>
</div>
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-12 px-4 rounded-lg bg-surface-container-low hover:bg-surface-container-high transition-colors text-on-surface-variant font-medium">
<img alt="Google Logo" class="w-5 h-5" data-alt="clean minimalist google logo on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9v87aIojs1x-NIqNWHbsIcCLc7EnjhNaKmjGjiiz84gwCP1sAvm-GRVw7pgPxOhfiO_fFnGAfLRD7Wqrfkj8U06yM2bdLIP_i4QJn4bvLU9PnyMGzUoQTFexBicDeRLcDE4gfuCBkt-nhAy1vm3EEyeisugKAKwJ6gDaI8j7Gjaw_BdU8a_cZ4m_Egv8mkDQfR4QzZaE-DYfIyFeUrZXExFMxDC9DtcAccBmnxeKSZVA4SzG9Chijxny7kuKWMMmZaSOf6MnbLQ3N"/>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-12 px-4 rounded-lg bg-surface-container-low hover:bg-surface-container-high transition-colors text-on-surface-variant font-medium">
<span class="material-symbols-outlined text-on-surface" data-weight="fill">ios</span>
<span>Apple</span>
</button>
</div>
</div>
</main>
<!-- Footer Navigation (As prescribed by Shared Components JSON) -->
<footer class="flex flex-col items-center gap-4 w-full px-8 mt-auto pb-12 font-inter text-sm tracking-wide leading-6 bg-transparent">
<div class="flex items-center gap-8">
<!-- Labels from JSON: ["Forgot Password", "Create Account"] -->
<a class="text-slate-500 hover:text-blue-800 transition-colors" href="#">Forgot Password</a>
<div class="w-1 h-1 rounded-full bg-outline-variant/50"></div>
<a class="font-semibold text-blue-700 underline-offset-4 underline hover:text-blue-800 transition-colors" href="#">Create Account</a>
</div>
<p class="text-slate-500 dark:text-slate-400">
            © 2024 TaskFlow Pro. Precision in every pixel.
        </p>
</footer>
<!-- Visual Polish: Mesh Gradient Overlays -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-20 opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-100/30 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-50/40 rounded-full blur-[120px]"></div>
</div>
</body></html>
