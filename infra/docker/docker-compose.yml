version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow_dev
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_dev_password
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

