version: "3.9"

# Performance testing stack — adds InfluxDB for unified metrics sink.
# Usage:
#   docker compose -f infra/docker/docker-compose.dev.yml \
#                  -f infra/docker/docker-compose.perf.yml up -d
#
# k6:     K6_OUT=influxdb=http://localhost:8086/k6 k6 run load_test.js
# JMeter: add Backend Listener → InfluxdbBackendListenerClient (url: http://localhost:8086)
# Locust: locust ... (write custom event listener to POST to InfluxDB)

services:

  influxdb:
    image: influxdb:2.7-alpine
    container_name: taskflow-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    influx_admin_password
      DOCKER_INFLUXDB_INIT_ORG:         taskflow
      DOCKER_INFLUXDB_INIT_BUCKET:      perf_results
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: taskflow-influx-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - taskflow-net

  # Grafana perf dashboard (separate from the main monitoring dashboard)
  grafana-perf:
    image: grafana/grafana:latest
    container_name: taskflow-grafana-perf
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"   # 3001 to avoid clash with the main Grafana on 3000
    depends_on:
      - influxdb
    networks:
      - taskflow-net

volumes:
  influxdb_data:

networks:
  taskflow-net:
    external: true   # reuse the network created by docker-compose.dev.yml
